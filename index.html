    html, body{height:100%;}

  <script>
  const DATA = JSON.parse(document.getElementById('matches-data').textContent);
  const STORAGE_KEY = 'copa2026_html_v1_state';
  const defaultSettings = {theme:'dark', accent:'#22c55e', compact:false, timezone:'America/Sao_Paulo', dateFormat:'DD/MM/YYYY', language:'pt', gameAlerts:true, scheduleUpdates:false, favoriteAlertsOnly:false};
  const state = {
    screen:'dashboard', matches: DATA.partidas || [], selectedMatch:null, selectedDate:null, month:5, year:2026,
    query:'', phase:'', group:'', stadium:'', status:'', page:1, pageSize:7,
    favorites:new Set(), alerts:new Set(), settings:{...defaultSettings}
  };
  const loadState = () => { try{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); state.settings={...defaultSettings,...(saved.settings||{})}; state.favorites=new Set(saved.favorites||[]); state.alerts=new Set(saved.alerts||[])}catch(e){} };
  const saveState = () => localStorage.setItem(STORAGE_KEY, JSON.stringify({settings:state.settings, favorites:[...state.favorites], alerts:[...state.alerts]}));
  const esc = v => String(v ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
  const shortName = (value, max=18) => { const text = String(value ?? '').trim(); return text.length > max ? text.slice(0, Math.max(1, max-1)).trimEnd() + '…' : text; };
  const byId = id => state.matches.find(m => m.id === id);
  function applySettings(){ document.body.dataset.theme = state.settings.theme; document.body.dataset.compact = state.settings.compact ? 'true' : 'false'; document.documentElement.style.setProperty('--accent', state.settings.accent || '#22c55e'); }
  function showToast(msg){ const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(window.toastTimer); window.toastTimer=setTimeout(()=>el.classList.remove('show'),1800); }
  function go(screen){ state.screen=screen; document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById('screen-'+screen).classList.add('active'); document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active', b.dataset.go===screen)); syncViewport(false); renderScreen(screen); const page=document.querySelector('.page'); if(page) page.scrollTo({top:0,behavior:'auto'}); }
  function fmtDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return state.settings.dateFormat==='MM/DD/YYYY' ? `${m}/${d}/${y}` : `${d}/${m}/${y}`; }
  function timeInTz(h){ const offsets={'America/Sao_Paulo':0,'America/New_York':-1,'UTC':3}; const off=offsets[state.settings.timezone]||0; const [hh,mm]=String(h||'00:00').split(':').map(Number); const t=(hh+off+24)%24; return `${String(t).padStart(2,'0')}:${String(mm||0).padStart(2,'0')}`; }
  function codeFor(m, side){ return (m[`pais_${side}`] || '').trim(); }
  function flag(code, alt='', big=false){ const safe=String(code||'').trim(); const cls='flag '+(big?'big':''); if(!safe) return `<span class="${cls} flag-fallback">${esc((alt||'TBD').slice(0,3))}</span>`; return `<img class="${cls}" src="cache/flags/${esc(safe)}.png" alt="${esc(alt||safe)}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'${cls} flag-fallback',textContent:'${esc((alt||safe).slice(0,3))}'}))">`; }
  function phaseClass(f){ f=String(f||'').toLowerCase(); if(f.includes('semif')) return 'semi'; if(f.includes('final') && !f.includes('oitavas') && !f.includes('quartas')) return 'final'; if(f.includes('32')||f.includes('16')||f.includes('oitavas')||f.includes('quartas')||f.includes('mata')||f.includes('playoff')) return 'ko'; return 'group'; }
  function phaseLabel(f){ f=String(f||''); if(f.toLowerCase().includes('fase de grupos')) return 'Grupos'; if(f.toLowerCase().includes('round of 32')||f.includes('32')) return '32 avos'; if(f.toLowerCase().includes('round of 16')||f.toLowerCase().includes('oitavas')) return 'Oitavas'; if(f.toLowerCase().includes('quarter')||f.toLowerCase().includes('quartas')) return 'Quartas'; if(f.toLowerCase().includes('semif')) return 'Semifinal'; if(f.toLowerCase().includes('3')) return '3º lugar'; if(f.toLowerCase().includes('final')) return 'Final'; return f; }
  function statusChip(m){ const done=String(m.status||'').toLowerCase().includes('encerr'); return `<span class="chip ${done?'done':'live'}">${done?'Encerrado':'Agendado'}</span>`; }
  function matchTitle(m){ return `${m.time_a} x ${m.time_b}`; }
  function sortedMatches(){ return [...state.matches].sort((a,b)=>(a.data+a.hora).localeCompare(b.data+b.hora)); }
  function nextMatch(){ return sortedMatches().find(m=>!String(m.status||'').toLowerCase().includes('encerr')) || sortedMatches()[0]; }
  function filteredMatches(){ const q=state.query.trim().toLowerCase(); return sortedMatches().filter(m => {
    const hay=[m.time_a,m.time_b,m.estadio,m.cidade,m.grupo,m.fase,m.status].join(' ').toLowerCase();
    return (!q || hay.includes(q)) && (!state.phase || phaseClass(m.fase)===state.phase) && (!state.group || m.grupo===state.group) && (!state.stadium || m.estadio===state.stadium) && (!state.status || String(m.status||'').toLowerCase().includes(state.status));

  function icsEscape(s){ return String(s??'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n'); }
  function exportICS(matches,name){ const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Calendario Copa 2026 HTML//PT-BR','METHOD:PUBLISH']; matches.forEach(m=>{ const dt=(m.data||'2026-06-11').replaceAll('-','')+'T'+String(m.hora||'00:00').replace(':','')+'00'; lines.push('BEGIN:VEVENT',`UID:${m.id}@copa2026-html`,`DTSTAMP:${new Date().toISOString().replace(/[-:]/g,'').split('.')[0]}Z`,`DTSTART:${dt}`,`SUMMARY:${icsEscape(matchTitle(m))}`,`LOCATION:${icsEscape(m.estadio+' - '+m.cidade)}`,`DESCRIPTION:${icsEscape(`${m.fase} · ${m.grupo} · Status: ${m.status}`)}`,'END:VEVENT'); }); lines.push('END:VCALENDAR'); downloadText(name, lines.join('\r\n'), 'text/calendar;charset=utf-8'); showToast('Arquivo .ics gerado'); }
  function exportCSV(matches,name){ const head=['numero','data','hora','fase','grupo','time_a','time_b','estadio','cidade','status']; const rows=[head.join(';')].concat(matches.map(m=>head.map(k=>`"${String(m[k]??'').replace(/"/g,'""')}"`).join(';'))); downloadText(name, rows.join('\n'), 'text/csv;charset=utf-8'); showToast('CSV gerado'); }
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>go(b.dataset.go)));
  document.getElementById('downloadAllBtn').addEventListener('click',()=>exportICS(state.matches,'calendario_copa_2026.ics'));
  document.getElementById('reloadBtn').addEventListener('click',()=>{showToast('Base local recarregada'); renderScreen(state.screen)});
  document.getElementById('fullscreenBtn').addEventListener('click',()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen?.(); else document.exitFullscreen?.(); });

  function getResponsivePageSize(){
    const h = window.innerHeight || 768;
    const w = window.innerWidth || 1366;
    let size = h < 700 ? 4 : h < 820 ? 5 : h < 940 ? 7 : 10;
    if (w < 1050) size = Math.min(size, 6);
    return Math.max(4, size);
  }
  function syncViewport(rerender=true){
    const nextSize = getResponsivePageSize();
    const changed = nextSize !== state.pageSize;
    state.pageSize = nextSize;
    document.documentElement.style.setProperty('--app-vh', `${window.innerHeight || 768}px`);
    if (rerender && changed && state.screen === 'games') renderGames();
  }
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const before = state.pageSize;
      syncViewport(false);
      if (state.screen === 'games' && before !== state.pageSize) renderGames();
      if (state.screen === 'calendar') renderCalendar();
    }, 140);
  });

  loadState(); applySettings(); syncViewport(false); renderDashboard();
  </script>
</body>
</html>
